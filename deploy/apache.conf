# KleverTorrentHub — Apache virtual host
#
# Replace every occurrence of "yourdomain.com" with your actual domain.
# Replace /var/www/ktorrent-hub with the path where you cloned the repo.
#
# Requirements:
#   sudo apt install apache2
#   sudo a2enmod proxy proxy_http rewrite headers ssl
#   sudo apt install certbot python3-certbot-apache   # for Let's Encrypt
#
# After editing:
#   sudo a2ensite ktorrent-hub
#   sudo apache2ctl configtest && sudo systemctl reload apache2

# ── Redirect HTTP → HTTPS ────────────────────────────────────
<VirtualHost *:80>
    ServerName yourdomain.com

    # Let's Encrypt ACME challenge (certbot manages this automatically)
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# ── HTTPS ────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName yourdomain.com

    # SSL — generate with: sudo certbot --apache -d yourdomain.com
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/yourdomain.com/privkey.pem
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder   on

    # Frontend static files (built with: cd frontend && npm run build)
    DocumentRoot /var/www/ktorrent-hub/frontend/dist

    <Directory /var/www/ktorrent-hub/frontend/dist>
        Options -Indexes
        AllowOverride All
        Require all granted
        # SPA fallback — serve index.html for all unknown paths
        FallbackResource /index.html
    </Directory>

    # Increase limit for .torrent uploads (matches MAX_TORRENT_SIZE in .env)
    LimitRequestBody 10485760

    # ── Backend API proxy ─────────────────────────────────────
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    ProxyPass        /api/ http://127.0.0.1:3000/api/
    ProxyPassReverse /api/ http://127.0.0.1:3000/api/

    # ── BitTorrent tracker announce & scrape ──────────────────
    ProxyPass        /announce http://127.0.0.1:3000/announce
    ProxyPassReverse /announce http://127.0.0.1:3000/announce

    ProxyPass        /scrape http://127.0.0.1:3000/scrape
    ProxyPassReverse /scrape http://127.0.0.1:3000/scrape

    # ── Uploaded .torrent files ───────────────────────────────
    ProxyPass        /uploads/ http://127.0.0.1:3000/uploads/
    ProxyPassReverse /uploads/ http://127.0.0.1:3000/uploads/

    # Logging
    ErrorLog  ${APACHE_LOG_DIR}/ktorrent-hub-error.log
    CustomLog ${APACHE_LOG_DIR}/ktorrent-hub-access.log combined
</VirtualHost>

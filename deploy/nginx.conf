# KleverTorrentHub — Nginx virtual host
#
# Replace every occurrence of "yourdomain.com" with your actual domain.
# Replace /var/www/ktorrent-hub with the path where you cloned the repo.
#
# Requirements:
#   sudo apt install nginx
#   sudo apt install certbot python3-certbot-nginx   # for Let's Encrypt
#
# After editing:
#   sudo ln -s /etc/nginx/sites-available/ktorrent-hub /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ── Redirect HTTP → HTTPS ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name yourdomain.com;

    # SSL — generate with: sudo certbot --nginx -d yourdomain.com
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Frontend static files (built with: cd frontend && npm run build)
    root  /var/www/ktorrent-hub/frontend/dist;
    index index.html;

    # Increase body size limit for .torrent uploads (default 5 MB + headroom)
    client_max_body_size 10M;

    # ── Backend API proxy ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── BitTorrent tracker announce & scrape ──────────────────
    # These endpoints use binary bencoded responses — no buffering.
    location ~ ^/(announce|scrape) {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
    }

    # ── Uploaded .torrent files ───────────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # ── SPA fallback (React Router) ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
